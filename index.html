<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firebase Test - Minimal</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <style>
        body { font-family: 'Sarabun', sans-serif; padding: 20px; max-width: 800px; margin: 0 auto; }
        .box { border: 2px solid #ccc; padding: 20px; margin: 20px 0; border-radius: 10px; }
        .firebase { border-color: #ff9100; background: #fff3e0; }
        textarea { width: 100%; height: 150px; font-family: monospace; }
        button { padding: 15px 30px; font-size: 16px; cursor: pointer; margin: 5px; }
        .btn-firebase { background: #ff9100; color: white; border: none; border-radius: 5px; }
        .success { color: green; }
        .error { color: red; }
        #status { margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>
    <h1>🔥 Firebase Real-time Editor (Minimal Test)</h1>
    
    <div class="box firebase">
        <h3>Step 1: ใส่ Firebase Config</h3>
        <textarea id="config" placeholder='{
  "apiKey": "...",
  "authDomain": "...",
  "projectId": "..."
}'></textarea>
        <br><br>
        <button class="btn-firebase" onclick="connectFirebase()">เชื่อมต่อ Firebase</button>
        <button onclick="testFunction()">ทดสอบฟังก์ชัน</button>
        <div id="status"></div>
    </div>

    <div class="box">
        <h3>Step 2: โหลดข้อมูล</h3>
        <input type="file" id="fileInput" accept=".json" onchange="loadFile(event)">
        <div id="fileStatus"></div>
    </div>

    <div class="box">
        <h3>รายการโครงการ</h3>
        <div id="projectList">ยังไม่มีข้อมูล</div>
    </div>

    <script>
        // ตัวแปร global
        let db = null;
        let auth = null;
        let projects = [];

        // ฟังก์ชันทดสอบ
        function testFunction() {
            document.getElementById('status').innerHTML = '<span class="success">✅ ฟังก์ชันทำงานได้!</span>';
            console.log('Test function works!');
        }

        // เชื่อมต่อ Firebase
        function connectFirebase() {
            console.log('Connecting...');
            const configText = document.getElementById('config').value.trim();
            
            if (!configText) {
                document.getElementById('status').innerHTML = '<span class="error">❌ ใส่ Config ก่อน</span>';
                return;
            }

            let config;
            try {
                config = JSON.parse(configText);
            } catch(e) {
                document.getElementById('status').innerHTML = '<span class="error">❌ JSON ผิด: ' + e.message + '</span>';
                return;
            }

            // ตรวจสอบ Firebase SDK
            if (typeof firebase === 'undefined') {
                document.getElementById('status').innerHTML = '<span class="error">❌ Firebase SDK ไม่มา</span>';
                return;
            }

            try {
                // Initialize
                if (!firebase.apps.length) {
                    firebase.initializeApp(config);
                }
                
                db = firebase.firestore();
                auth = firebase.auth();
                
                // Anonymous login
                auth.signInAnonymously()
                    .then(user => {
                        document.getElementById('status').innerHTML = 
                            '<span class="success">✅ เชื่อมต่อสำเร็จ!<br>UID: ' + user.user.uid.substring(0, 8) + '...</span>';
                        
                        // บันทึก config
                        localStorage.setItem('fbConfig', configText);
                    })
                    .catch(err => {
                        document.getElementById('status').innerHTML = '<span class="error">❌ Login ล้มเหลว: ' + err.message + '</span>';
                    });
                    
            } catch(e) {
                document.getElementById('status').innerHTML = '<span class="error">❌ Error: ' + e.message + '</span>';
            }
        }

        // โหลดไฟล์
        function loadFile(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = JSON.parse(e.target.result);
                    
                    if (data.projects) {
                        projects = data.projects;
                    } else if (Array.isArray(data)) {
                        projects = data;
                    } else {
                        throw new Error('รูปแบบไม่ถูกต้อง');
                    }
                    
                    document.getElementById('fileStatus').innerHTML = 
                        '<span class="success">✅ โหลดสำเร็จ: ' + projects.length + ' โครงการ</span>';
                    
                    showProjects();
                    
                    // Auto upload to Firebase
                    if (db && projects.length > 0) {
                        uploadToFirebase();
                    }
                    
                } catch(err) {
                    document.getElementById('fileStatus').innerHTML = 
                        '<span class="error">❌ ผิดพลาด: ' + err.message + '</span>';
                }
            };
            reader.readAsText(file);
        }

        // แสดงรายการ
        function showProjects() {
            const list = document.getElementById('projectList');
            if (projects.length === 0) {
                list.innerHTML = 'ไม่มีข้อมูล';
                return;
            }
            
            list.innerHTML = projects.slice(0, 10).map((p, i) => 
                '<div style="padding: 10px; border-bottom: 1px solid #ddd;">' +
                '<b>' + (p.project_id || p.id || '#'+i) + '</b>: ' + 
                (p.project_name || p.name || 'ไม่มีชื่อ').substring(0, 50) +
                '</div>'
            ).join('') + (projects.length > 10 ? '<div>...และอีก ' + (projects.length-10) + ' รายการ</div>' : '');
        }

        // อัปโหลดไป Firebase
        function uploadToFirebase() {
            if (!db) {
                alert('เชื่อมต่อ Firebase ก่อน!');
                return;
            }
            
            const status = document.getElementById('fileStatus');
            status.innerHTML += '<br>กำลังอัปโหลด ' + projects.length + ' โครงการ...';
            
            let success = 0;
            let failed = 0;
            
            projects.forEach((proj, idx) => {
                const id = proj.project_id || proj.id || 'proj-' + idx;
                
                db.collection('projects').doc(id).set({
                    ...proj,
                    uploadedAt: new Date().toISOString()
                })
                .then(() => {
                    success++;
                    if (success + failed === projects.length) {
                        status.innerHTML += '<br><span class="success">✅ สำเร็จ: ' + success + ' รายการ</span>';
                    }
                })
                .catch(err => {
                    failed++;
                    console.error('Upload error:', err);
                });
            });
        }

        // โหลด config เก่า
        window.onload = function() {
            const saved = localStorage.getItem('fbConfig');
            if (saved) {
                document.getElementById('config').value = saved;
            }
            console.log('Page loaded successfully!');
        };
    </script>
</body>
</html>
