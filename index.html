<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Service Plan Editor | เขตสุขภาพที่ 1</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #1e3a8a;
            --primary-light: #3b82f6;
            --secondary: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --info: #06b6d4;
            --gemini: #4285f4;
            --bg: #f0f4f8;
            --card-bg: #ffffff;
            --text: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            --radius: 12px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Sarabun', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }

        .header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            color: white;
            padding: 20px 30px;
            box-shadow: var(--shadow);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .header-content {
            max-width: 1600px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo-icon {
            font-size: 2em;
            background: rgba(255, 255, 255, 0.2);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-text h1 {
            font-size: 1.5em;
            font-weight: 700;
        }

        .logo-text p {
            font-size: 0.85em;
            opacity: 0.9;
        }

        .header-actions {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .main-container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 30px;
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 25px;
        }

        @media (max-width: 1200px) {
            .main-container {
                grid-template-columns: 1fr;
            }
        }

        .panel {
            background: var(--card-bg);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .panel-header {
            padding: 20px;
            background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .panel-title {
            font-size: 1.1em;
            font-weight: 600;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .panel-body {
            padding: 20px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-family: inherit;
            font-size: 0.95em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            color: white;
        }

        .btn-success {
            background: linear-gradient(135deg, var(--secondary) 0%, #059669 100%);
            color: white;
        }

        .btn-secondary {
            background: #e0e7ff;
            color: var(--primary);
        }

        .btn-gemini {
            background: linear-gradient(135deg, var(--gemini) 0%, #34a853 100%);
            color: white;
        }

        .btn-warning {
            background: linear-gradient(135deg, var(--warning) 0%, #d97706 100%);
            color: white;
        }

        .btn-sm {
            padding: 6px 12px;
            font-size: 0.85em;
        }

        .project-list {
            max-height: calc(100vh - 250px);
            overflow-y: auto;
        }

        .project-item {
            padding: 15px;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            transition: all 0.3s;
            border-left: 4px solid transparent;
        }

        .project-item:hover,
        .project-item.active {
            background: #e0e7ff;
            border-left-color: var(--primary);
        }

        .project-id {
            font-size: 0.75em;
            color: var(--text-muted);
            font-weight: 600;
        }

        .project-name {
            font-weight: 600;
            color: var(--text);
            margin: 5px 0;
            line-height: 1.4;
            font-size: 0.95em;
        }

        .project-meta {
            display: flex;
            gap: 8px;
            font-size: 0.75em;
            flex-wrap: wrap;
            align-items: center;
        }

        .project-type {
            padding: 2px 8px;
            border-radius: 10px;
            font-weight: 600;
        }

        .project-type.cso {
            background: #e0e7ff;
            color: var(--primary);
        }

        .project-type.flagship {
            background: #f3e8ff;
            color: #7c3aed;
        }

        .status-badge {
            padding: 2px 8px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 0.75em;
        }

        .status-draft {
            background: #fef3c7;
            color: #92400e;
        }

        .status-edited {
            background: #dbeafe;
            color: #1e40af;
        }

        .status-ai {
            background: #d1fae5;
            color: #065f46;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 600;
        }

        .badge-success {
            background: #d1fae5;
            color: #065f46;
        }

        .badge-info {
            background: #dbeafe;
            color: #1e40af;
        }

        .search-box {
            position: relative;
            margin-bottom: 15px;
        }

        .search-input {
            width: 100%;
            padding: 12px 15px 12px 45px;
            border: 2px solid var(--border);
            border-radius: 10px;
            font-family: inherit;
            font-size: 1em;
        }

        .search-icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-muted);
        }

        .stats-bar {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .stat-item {
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 0.85em;
        }

        .stat-value {
            font-weight: 700;
            color: var(--primary);
        }

        /* Form Styles */
        .form-section {
            margin-bottom: 30px;
        }

        .form-section-title {
            font-size: 1.1em;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--border);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 0.9em;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 8px;
        }

        .form-label .optional {
            font-weight: 400;
            color: var(--text-muted);
            font-size: 0.85em;
        }

        .form-input,
        .form-textarea,
        .form-select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid var(--border);
            border-radius: 8px;
            font-family: inherit;
            font-size: 1em;
            transition: all 0.3s;
        }

        .form-input:focus,
        .form-textarea:focus,
        .form-select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .form-textarea {
            min-height: 100px;
            resize: vertical;
        }

        .form-textarea.large {
            min-height: 150px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr;
            }
        }

        .field-actions {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }

        .ai-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-size: 0.75em;
            color: var(--gemini);
            background: #e8f0fe;
            padding: 2px 8px;
            border-radius: 4px;
            margin-left: 8px;
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 5px;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--border);
            padding-bottom: 0;
        }

        .tab-btn {
            padding: 12px 24px;
            border: none;
            background: transparent;
            color: var(--text-muted);
            font-family: inherit;
            font-weight: 600;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            margin-bottom: -2px;
            transition: all 0.3s;
        }

        .tab-btn:hover {
            color: var(--primary);
        }

        .tab-btn.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* Editor specific */
        .editor-container {
            background: #f8fafc;
            border-radius: var(--radius);
            padding: 25px;
        }

        .readonly-field {
            background: #f1f5f9;
            padding: 12px 15px;
            border-radius: 8px;
            color: var(--text-muted);
            font-size: 0.95em;
        }

        .comparison-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
        }

        @media (max-width: 1200px) {
            .comparison-grid {
                grid-template-columns: 1fr;
            }
        }

        .comparison-box {
            background: white;
            border-radius: var(--radius);
            padding: 25px;
            border: 2px solid var(--border);
        }

        .comparison-box.before {
            border-color: #fecaca;
            background: linear-gradient(135deg, #fef2f2 0%, #fff 100%);
        }

        .comparison-box.after {
            border-color: #bbf7d0;
            background: linear-gradient(135deg, #f0fdf4 0%, #fff 100%);
        }

        .comparison-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px dashed rgba(0, 0, 0, 0.1);
        }

        .comparison-title {
            font-size: 1.2em;
            font-weight: 700;
        }

        .comparison-box.before .comparison-title {
            color: #991b1b;
        }

        .comparison-box.after .comparison-title {
            color: #166534;
        }

        /* API Section */
        .api-section {
            background: linear-gradient(135deg, #e8f0fe 0%, #d2e3fc 100%);
            border: 2px solid var(--gemini);
            border-radius: var(--radius);
            padding: 20px;
            margin-bottom: 25px;
        }

        .api-section h4 {
            color: var(--gemini);
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .api-input {
            width: 100%;
            padding: 12px;
            border: 2px solid var(--border);
            border-radius: 8px;
            font-family: inherit;
            margin-bottom: 10px;
        }

        /* Action Buttons */
        .action-bar {
            position: sticky;
            bottom: 0;
            background: white;
            padding: 20px;
            border-top: 2px solid var(--border);
            display: flex;
            gap: 15px;
            justify-content: flex-end;
            margin: 30px -25px -25px -25px;
            border-radius: 0 0 var(--radius) var(--radius);
        }

        /* Loading */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255, 255, 255, 0.95);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 3000;
        }

        .loading-overlay.active {
            display: flex;
        }

        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 4px solid #e2e8f0;
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Notifications */
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 20px;
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
            z-index: 9999;
            animation: slideIn 0.3s ease;
            max-width: 400px;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }

            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .notification.success {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
        }

        .notification.error {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            color: white;
        }

        /* Data Import Section */
        .data-import-section {
            background: #fef3c7;
            border: 2px dashed #fbbf24;
            border-radius: var(--radius);
            padding: 30px;
            text-align: center;
            margin-bottom: 25px;
        }

        .data-import-section.dragover {
            background: #fde68a;
            border-color: #f59e0b;
        }

        /* Filter Styles */
        .filter-section {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: var(--radius);
            padding: 12px;
        }

        .filter-group {
            margin-bottom: 12px;
        }

        .filter-options {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
        }

        .filter-chip {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.8em;
            cursor: pointer;
            border: 1px solid #e2e8f0;
            background: white;
            transition: all 0.2s;
            user-select: none;
        }

        .filter-chip:hover {
            background: #f1f5f9;
        }

        .filter-chip.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .filter-chip input {
            display: none;
        }

        .filter-section-item {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 4px 8px;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .filter-section-item:hover {
            background: #f1f5f9;
        }

        .filter-section-item input {
            margin: 0;
        }

        .btn-xs {
            font-size: 0.75em;
            padding: 2px 8px;
        }

        /* Custom scrollbar for filter sections */
        #filter-sections::-webkit-scrollbar {
            width: 6px;
        }

        #filter-sections::-webkit-scrollbar-track {
            background: #f1f5f9;
            border-radius: 3px;
        }

        #filter-sections::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 3px;
        }

        #filter-sections::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        /* AI Context Input Styling */
        #ai-context-input {
            border: 2px solid #bae6fd;
            background: white;
            transition: all 0.3s ease;
        }

        #ai-context-input:focus {
            border-color: #0284c7;
            box-shadow: 0 0 0 3px rgba(2, 132, 199, 0.1);
            outline: none;
        }

        #context-char-count {
            font-weight: 600;
            transition: color 0.3s ease;
        }
    </style>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
</head>

<body>
    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner"></div>
        <div style="margin-top: 20px; color: var(--text-muted);">กำลังโหลดข้อมูล...</div>
    </div>

    <!-- Header -->
    <header class="header">
        <div class="header-content">
            <div class="logo">
                <div class="logo-icon"><i class="fas fa-edit"></i></div>
                <div class="logo-text">
                    <h1>Service Plan Editor</h1>
                    <p>เขตสุขภาพที่ 1 | ระบบแก้ไขข้อมูลโครงการ</p>
                </div>
            </div>
            <div class="header-actions">
                <span class="badge badge-info" id="headerCount">0 โครงการ</span>
                <button class="btn btn-primary btn-sm" onclick="showUserManual()"
                    style="background-color: var(--primary); color: white;">
                    <i class="fas fa-book"></i> คู่มือการใช้งาน
                </button>
                <button class="btn btn-secondary btn-sm" onclick="showGlobalProgression()">
                    <i class="fas fa-chart-bar"></i> ความคืบหน้า
                </button>
                <button class="btn btn-secondary btn-sm" onclick="exportAllData()">
                    <i class="fas fa-download"></i> ส่งออก JSON
                </button>

                <button class="btn btn-success btn-sm" onclick="saveAllToLocal()">
                    <i class="fas fa-save"></i> บันทึกทั้งหมด
                </button>

            </div>
        </div>
    </header>

    <!-- Main Container -->
    <div class="main-container">
        <!-- Left Panel: Project List -->
        <aside class="left-panel panel">
            <div class="panel-header">
                <div class="panel-title">
                    <i class="fas fa-list"></i>
                    รายการโครงการ
                </div>
            </div>
            <div class="panel-body">
                <div class="stats-bar">
                    <div class="stat-item">CSO: <span class="stat-value" id="csoCount">0</span></div>
                    <div class="stat-item">Flagship: <span class="stat-value" id="flagshipCount">0</span></div>
                </div>

                <div class="search-box">
                    <i class="fas fa-search search-icon"></i>
                    <input type="text" class="search-input" placeholder="ค้นหาโครงการ..." id="searchInput">
                </div>

                <!-- Filter Section -->
                <div class="filter-section" style="margin-bottom: 15px;">
                    <div
                        style="font-size: 0.85em; font-weight: 600; color: #666; margin-bottom: 10px; display: flex; align-items: center; gap: 5px;">
                        <i class="fas fa-filter"></i> ตัวกรอง
                        <button class="btn btn-sm btn-secondary" onclick="resetFilters()"
                            style="margin-left: auto; font-size: 0.8em; padding: 2px 8px;">
                            <i class="fas fa-undo"></i> รีเซ็ต
                        </button>
                    </div>

                    <!-- Type Filter -->
                    <div class="filter-group" style="margin-bottom: 12px;">
                        <div style="font-size: 0.8em; color: #888; margin-bottom: 5px;">ประเภทโครงการ</div>
                        <div class="filter-options" id="filter-types" style="display: flex; flex-wrap: wrap; gap: 5px;">
                        </div>
                    </div>

                    <!-- Section Filter (for CSO) -->
                    <div class="filter-group" style="margin-bottom: 12px;">
                        <div
                            style="font-size: 0.8em; color: #888; margin-bottom: 5px; display: flex; justify-content: space-between; align-items: center;">
                            <span>Service Plan (สาขา)</span>
                            <div style="display: flex; gap: 4px;">
                                <button class="btn btn-xs" onclick="selectAllSections()"
                                    style="font-size: 0.7em; padding: 1px 5px;">เลือกทั้งหมด</button>
                                <button class="btn btn-xs" onclick="clearSections()"
                                    style="font-size: 0.7em; padding: 1px 5px;">ล้าง</button>
                            </div>
                        </div>
                        <div class="filter-options" id="filter-sections"
                            style="max-height: 120px; overflow-y: auto; font-size: 0.85em;"></div>
                    </div>

                    <!-- Status Filter -->
                    <div class="filter-group" style="margin-bottom: 12px;">
                        <div style="font-size: 0.8em; color: #888; margin-bottom: 5px;">สถานะ</div>
                        <div class="filter-options" id="filter-status"
                            style="display: flex; flex-wrap: wrap; gap: 5px;"></div>
                    </div>

                    <!-- Filter Stats -->
                    <div style="font-size: 0.8em; color: #666; padding-top: 8px; border-top: 1px solid #eee;">
                        แสดง <span id="filtered-count" style="font-weight: 600; color: var(--primary);">0</span> จาก
                        <span id="total-count">0</span> โครงการ
                    </div>
                </div>

                <div class="project-list" id="projectList">
                    <div class="empty-state">
                        <i class="fas fa-spinner fa-spin"></i>
                        <p>กำลังโหลด...</p>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Right Panel: Editor -->
        <main class="right-panel">
            <div class="panel" id="editorPanel">
                <div class="panel-header">
                    <div class="panel-title" id="editorTitle">
                        <i class="fas fa-mouse-pointer"></i>
                        เลือกโครงการเพื่อแก้ไข
                    </div>
                </div>
                <div class="panel-body">
                    <div id="welcomeScreen">
                        <div class="empty-state">
                            <i class="fas fa-hand-pointer" style="font-size: 4em; opacity: 0.5;"></i>
                            <h3>เลือกโครงการจากรายการด้านซ้าย</h3>
                        </div>
                    </div>

                    <div id="editorContent" style="display: none;">
                        <!-- Content will be rendered here -->
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // ============================================

                // สร้างชุดข้อมูลที่ขาดหายไปใน Firebase (อิงตามไฟล์ที่ฝังไว้)
                embeddedProjectsData.forEach(p => {
                    if (!existingIds.has(p.id)) {
                        const docRef = projectsRef.doc(p.id);
                        batch.set(docRef, p);
                        hasNewSeed = true;
                    }
                });

                if (hasNewSeed) {
                    showLoading('กำลังเพิ่มรายชื่อโครงการที่ขาดหายไป (Seed Data)...');
                    await batch.commit();
                    console.log("Seeded missing projects into database");
                }

                // === โหลดข้อมูลด้วย get() (แทน onSnapshot ที่ถูก block 404) ===
                await loadProjectsFromFirebase(projectsRef);

                setupEventListeners();
                showNotification('โหลดข้อมูลจาก Firebase สำเร็จ!', 'success');
            } catch (error) {
                console.error('Firebase Error:', error);
                hideLoading();
                showNotification('เกิดข้อผิดพลาดในการเชื่อมต่อ Firebase', 'error');
            }
        }

        const CACHE_KEY = 'service_plan_projects_cache';
        const CACHE_TIME_KEY = 'service_plan_projects_cache_time';
        const CACHE_TTL = 10 * 60 * 1000; // Cache 10 นาที (ป้องกัน F5 รัวๆ)

        // ฟังก์ชันโหลดข้อมูลจาก Firebase ด้วย get() (พร้อมระบบ Cache 10 นาที)
        async function loadProjectsFromFirebase(projectsRef, forceRefresh = false) {
            const now = Date.now();
            const cachedData = sessionStorage.getItem(CACHE_KEY);
            const cachedTime = sessionStorage.getItem(CACHE_TIME_KEY);

            // ถ้าไม่ได้บังคับรีเฟรช และมี Cache ที่อายุไม่เกิน 10 นาที -> ใช้ Cache แทน ประหยัด Read มหาศาล!
            if (!forceRefresh && cachedData && cachedTime && (now - parseInt(cachedTime) < CACHE_TTL)) {
                allProjects = JSON.parse(cachedData);
                console.log(`Loaded ${allProjects.length} projects from Local Cache (0 Reads!)`);
            } else {
                showLoading('กำลังดึงข้อมูลจาก Cloud...');
                const snapshot = await projectsRef.get();
                allProjects = [];

                snapshot.forEach(doc => {
                    const data = doc.data();
                    const docId = doc.id;
                    // Firebase = Source of Truth เดียว (ไม่ merge กับ embedded data อีกต่อไป)
                    allProjects.push({ ...data, id: docId });
                });

                // หมายเหตุ: โครงการที่ไม่มีใน Firebase จะถูก seed เข้าไปตอน initFirebaseAndLoadData
                // ไม่ต้องเพิ่มจาก embedded data อีกแล้ว

                // บันทึกลง Cache
                sessionStorage.setItem(CACHE_KEY, JSON.stringify(allProjects));
                sessionStorage.setItem(CACHE_TIME_KEY, now.toString());
                console.log(`Loaded ${allProjects.length} projects from Firebase (get mode) and Cached`);
            }

            sourceProjects = [...allProjects];
            filteredProjects = [...allProjects];

            const sections = getUniqueSections();
            filterState.sections.clear();
            sections.forEach(s => filterState.sections.add(s));

            updateStats();
            renderFilters();
            applyFilters();
            hideLoading();
        }

        // ฟังก์ชันรีเฟรชข้อมูล (เรียกเมื่อผู้ใช้ตั้งใจกดปุ่มรีเฟรช ไอคอนหมุนๆ)
        async function refreshFromFirebase() {
            try {
                showLoading('กำลังรีเฟรชข้อมูล...');
                const projectsRef = db.collection('service_plan_projects');
                // ส่ง parameter forceRefresh = true เพื่อทะลุ Cache ไปดึงใหม่จาก Firebase
                await loadProjectsFromFirebase(projectsRef, true);

                // อัปเดต selectedProject ถ้ามีอยู่
                if (selectedProject) {
                    const updated = allProjects.find(p => p.id === selectedProject.id);
                    if (updated) {
                        selectedProject = updated;
                        renderEditor();
                    }
                }
                showNotification('รีเฟรชข้อมูลสำเร็จ!', 'success');
            } catch (err) {
                console.error('Refresh error:', err);
                showNotification('รีเฟรชล้มเหลว: ' + err.message, 'error');
            }
        }

            if (num >= 1000) return num.toLocaleString() + ' บาท';
            return num + ' บาท';
        }

        // ============================================
        // FILTER FUNCTIONS
        // ============================================
        function getUniqueSections() {
            const sections = new Set();
            allProjects.filter(p => p.type === 'CSO').forEach(p => {
                if (p.section) sections.add(p.section);
            });
            return Array.from(sections).sort();
        }

        function renderFilters() {
            // Type Filter - แสดงชื่อที่อ่านง่าย แต่ใช้ค่าเดิมจาก data
            const typeContainer = document.getElementById('filter-types');
            if (typeContainer) {
                const typeOptions = [
                    { key: 'CSO', label: 'CSO' },
                    { key: 'FLAGSHIP', label: 'Flagship' }
                ];
                typeContainer.innerHTML = typeOptions.map(opt => {
                    const isActive = filterState.types.has(opt.key);
                    return `
                        <label class="filter-chip ${isActive ? 'active' : ''}">
                            <input type="checkbox" ${isActive ? 'checked' : ''} onchange="toggleType('${opt.key}')">
                            ${opt.label}
                        </label>
                    `;
                }).join('');
            }

            // Section Filter
            const sectionContainer = document.getElementById('filter-sections');
            if (sectionContainer) {
                const sections = getUniqueSections();
                sectionContainer.innerHTML = sections.map(section => {
                    const isActive = filterState.sections.has(section);
                    const escapedSection = section.replace(/'/g, "\\'").replace(/"/g, '&quot;');
                    return `
                        <label class="filter-section-item">
                            <input type="checkbox" ${isActive ? 'checked' : ''} onchange="toggleSection('${escapedSection}')">
                            <span>${section}</span>
                        </label>
                    `;
                }).join('');
            }

            // Status Filter
            const statusContainer = document.getElementById('filter-status');
            if (statusContainer) {
                const statusLabels = {
                    'draft': 'ร่าง',
                    'edited': 'แก้ไข',
                    'ai-reviewed': 'AI รีวิว',
                    'ai': 'AI'
                };
                statusContainer.innerHTML = Object.entries(statusLabels).map(([key, label]) => {
                    const isActive = filterState.status.has(key);
                    return `
                        <label class="filter-chip ${isActive ? 'active' : ''}">
                            <input type="checkbox" ${isActive ? 'checked' : ''} onchange="toggleStatus('${key}')">
                            ${label}
                        </label>
                    `;
                }).join('');
            }
        }

        function getProjectStatus(project) {
            if (project.after?.objective && project.after?.method) {
                return 'ai';
            } else if (project.status === 'ai-reviewed') {
                return 'ai-reviewed';
            } else if (project.lastModified) {
                return 'edited';
            }
            return 'draft';
        }

        function applyFilters() {
            const searchTerm = document.getElementById('searchInput')?.value?.toLowerCase() || '';

            filteredProjects = allProjects.filter(p => {
                // Type filter
                if (!filterState.types.has(p.type)) return false;

                // Section filter (สำหรับ CSO เท่านั้น)
                if (p.type === 'CSO' && filterState.sections.size > 0) {
                    if (!filterState.sections.has(p.section)) return false;
                }

                // Status filter
                const status = getProjectStatus(p);
                if (!filterState.status.has(status)) return false;

                // Search filter
                if (searchTerm) {
                    const matchName = p.name?.toLowerCase().includes(searchTerm);
                    const matchId = p.id?.toLowerCase().includes(searchTerm);
                    const matchSection = p.section?.toLowerCase().includes(searchTerm);
                    if (!matchName && !matchId && !matchSection) return false;
                }

                return true;
            });

            renderProjectList();
        }

        function toggleType(type) {
            if (filterState.types.has(type)) {
                filterState.types.delete(type);
            } else {
                filterState.types.add(type);
            }
            renderFilters();
            applyFilters();
        }

        function toggleSection(section) {
            if (filterState.sections.has(section)) {
                filterState.sections.delete(section);
            } else {
                filterState.sections.add(section);
            }
            renderFilters();
            applyFilters();
        }

        function toggleStatus(status) {
            if (filterState.status.has(status)) {
                filterState.status.delete(status);
            } else {
                filterState.status.add(status);
            }
            renderFilters();
            applyFilters();
        }

        function selectAllSections() {
            const sections = getUniqueSections();
            sections.forEach(s => filterState.sections.add(s));
            renderFilters();
            applyFilters();
        }

        function clearSections() {
            filterState.sections.clear();
            renderFilters();
            applyFilters();
        }

        function resetFilters() {
            filterState.types = new Set(['CSO', 'FLAGSHIP']);
            filterState.sections.clear();
            filterState.status = new Set(['draft', 'edited', 'ai-reviewed', 'ai']);
            document.getElementById('searchInput').value = '';
            renderFilters();
            applyFilters();
        }

        async function selectProject(projectId) {
            console.log('selectProject called:', projectId);

            // 1. Render Optimistic UI ด้วยข้อมูลจาก Cache
            const cachedProject = allProjects.find(p => p.id === projectId);
            if (!cachedProject) return;

            selectedProject = cachedProject;
            renderProjectList();
            renderEditor();

            // 2. ดึงข้อมูลล่าสุดจาก Firebase เพื่อป้องกันการเขียนทับ (Race Condition)
            try {
                const docRef = db.collection('service_plan_projects').doc(projectId);
                const docSnapshot = await docRef.get();

                if (docSnapshot.exists) {
                    const freshData = docSnapshot.data();

                    // Firebase = Source of Truth เดียว (ไม่ merge กับ embedded data อีกต่อไป)
                    selectedProject = { ...freshData, id: projectId };

                    // อัปเดตตาราง All Projects ใน Memory ด้วย
                    const index = allProjects.findIndex(p => p.id === projectId);
                    if (index !== -1) {
                        allProjects[index] = selectedProject;
                    }

                    // Render Editor อีกครั้ง (เพื่อแสดงข้อมูล After ที่คนอื่นอาจจะเพิ่งพิมพ์ไป)
                    renderEditor();
                }
            } catch (error) {
                console.error("Error fetching fresh project data:", error);
                // ถ้าดึงไม่ได้ ให้ใช้ cache ตามเดิม
            }
        }

        function switchTab(tabName) {
            // Update buttons
            const tabIndex = { 'before': 0, 'after': 1, 'compare': 2 };
            document.querySelectorAll('.tab-btn').forEach((btn, i) => {
                btn.classList.remove('active');
                if (i === tabIndex[tabName]) btn.classList.add('active');
            });

            if (tabName === 'compare' && selectedProject) {
                // Sync data from form to selectedProject before rendering comparison
                selectedProject.before = {
                    ...selectedProject.before,
                    objective: document.getElementById('before-objective')?.value || '',
                    target_group: document.getElementById('before-target')?.value || '',
                    method: document.getElementById('before-method')?.value || '',
                    indicators: document.getElementById('before-indicators')?.value || ''
                };

                let kpisData = document.getElementById('after-kpis')?.value || '';
                selectedProject.after = {
                    ...selectedProject.after,
                    objective: document.getElementById('after-objective')?.value || '',
                    target_group: document.getElementById('after-target')?.value || '',
                    method: document.getElementById('after-method')?.value || '',
                    innovation: document.getElementById('after-innovation')?.value || '',
                    kpis: kpisData ? kpisData.split('\n').filter(k => k.trim()) : []
                };

                // Re-render the compare tab with the form's current values
                const compareTab = document.getElementById('tab-compare');
                if (compareTab) {
                    compareTab.innerHTML = renderComparison(selectedProject);
                }
            }

            // Update content
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            document.getElementById(`tab-${tabName}`).classList.add('active');
        }

        // ============================================
        // SAVE FUNCTIONS
        // ============================================
        async function saveCurrentProject() {
            if (!selectedProject) return;

            // ดึงชื่อผู้แก้ไข
            const editorInput = document.getElementById('editor-name-input');
            const editorName = editorInput?.value?.trim() || 'ไม่ระบุ';

            if (!editorInput?.value?.trim()) {
                showNotification('กรุณากรอกชื่อผู้แก้ไขก่อนบันทึก', 'warning');
                editorInput?.focus();
                return;
            }

            // Update from form inputs
            const activeTab = document.querySelector('.tab-content.active').id;

            // เก็บข้อมูลเก่าก่อนแก้ไข (สำหรับเปรียบเทียบ)
            const oldBefore = { ...selectedProject.before };
            const oldAfter = { ...selectedProject.after };

            // Helper: ดึงค่าจาก DOM อย่างปลอดภัย — ถ้า element มีอยู่ใช้ค่าจาก DOM เลย (แม้เป็น ""),
            // ถ้า element ไม่มีใน DOM (เช่น tab ยังไม่ render) ให้ใช้ fallback จากข้อมูลเดิม
            function getFieldValue(elementId, fallback) {
                const el = document.getElementById(elementId);
                if (el !== null) {
                    return el.value; // ใช้ค่าจาก DOM ตรงๆ (แม้เป็น empty string ก็เก็บ empty string)
                }
                return fallback ?? ''; // element ไม่มีใน DOM → ใช้ fallback
            }

            // All project data is in the DOM (under display: none if tab is inactive).
            // We should always gather the latest data from the input fields.
            selectedProject.before = {
                objective: getFieldValue('before-objective', selectedProject.before?.objective),
                target_group: getFieldValue('before-target', selectedProject.before?.target_group),
                method: getFieldValue('before-method', selectedProject.before?.method),
                indicators: getFieldValue('before-indicators', selectedProject.before?.indicators)
            };

            selectedProject.after = {
                objective: getFieldValue('after-objective', selectedProject.after?.objective),
                target_group: getFieldValue('after-target', selectedProject.after?.target_group),
                method: getFieldValue('after-method', selectedProject.after?.method),
                innovation: getFieldValue('after-innovation', selectedProject.after?.innovation),
                kpis: (() => {
                    const el = document.getElementById('after-kpis');
                    if (el !== null) {
                        return el.value.split('\n').filter(k => k.trim());
                    }
                    return selectedProject.after?.kpis ?? [];
                })()
            };

            // บันทึก AI Context
            const contextInput = document.getElementById('ai-context-input');
            if (contextInput) {
                selectedProject.aiContext = contextInput.value.trim();
            }

            // บันทึกผู้แก้ไขปัจจุบัน
            selectedProject.lastEditedBy = editorName;
            selectedProject.lastModified = new Date().toISOString(); // เก็บ local copy
            selectedProject.lastModifiedServer = firebase.firestore.FieldValue.serverTimestamp(); // server timestamp สำหรับ Firestore
            selectedProject.status = selectedProject.after?.objective ? 'ai' : 'edited';

            // สร้างประวัติการแก้ไข (Edit History)
            if (!selectedProject.editHistory) {
                selectedProject.editHistory = [];
            }

            // หาข้อมูลที่เปลี่ยนแปลง
            const changedFields = [];
            if (oldBefore.objective !== selectedProject.before.objective) changedFields.push('วัตถุประสงค์ต้นฉบับ');
            if (oldBefore.target_group !== selectedProject.before.target_group) changedFields.push('กลุ่มเป้าหมายต้นฉบับ');
            if (oldBefore.method !== selectedProject.before.method) changedFields.push('วิธีการต้นฉบับ');
            if (oldAfter.objective !== selectedProject.after.objective) changedFields.push('วัตถุประสงค์ (After)');
            if (oldAfter.target_group !== selectedProject.after.target_group) changedFields.push('กลุ่มเป้าหมาย (After)');
            if (oldAfter.method !== selectedProject.after.method) changedFields.push('วิธีการ (After)');
            if (oldAfter.innovation !== selectedProject.after.innovation) changedFields.push('นวัตกรรม');

            // เพิ่ม record ใน history
            selectedProject.editHistory.push({
                timestamp: new Date().toISOString(),
                editor: editorName,
                action: activeTab === 'tab-after' && selectedProject.after?.objective ? 'ai_assist' : 'manual_edit',
                tab: activeTab,
                changedFields: changedFields.length > 0 ? changedFields : ['general'],
                aiAssisted: activeTab === 'tab-after' && selectedProject.after?.objective ? true : false
            });

            // จำกัด history ไม่เกิน 50 records (เก็บล่าสุด)
            if (selectedProject.editHistory.length > 50) {
                selectedProject.editHistory = selectedProject.editHistory.slice(-50);
            }

            // อัปเดต allProjects และ filteredProjects (สำคัญ!)
            const index = allProjects.findIndex(p => p.id === selectedProject.id);
            if (index >= 0) {
                allProjects[index] = selectedProject;
            }
            const filteredIndex = filteredProjects.findIndex(p => p.id === selectedProject.id);
            if (filteredIndex >= 0) {
                filteredProjects[filteredIndex] = selectedProject;
            }

            // Save to Firebase
            try {
                // แปลงข้อมูลเพื่อหลีกเลี่ยงค่า undefined ที่ Firebase ไม่รองรับ
                const sanitizedProject = JSON.parse(JSON.stringify(selectedProject));

                showNotification('กำลังบันทึกข้อมูลไปยังระบบ...', 'info');

                await db.collection('service_plan_projects').doc(selectedProject.id).set(sanitizedProject, { merge: true });
                // Write to activity_logs
                await db.collection('activity_logs').add({
                    projectId: selectedProject.id,
                    projectName: selectedProject.name,
                    editor: editorName,
                    action: activeTab === 'tab-after' && selectedProject.after?.objective ? 'AI Assist (After)' : 'Manual Edit',
                    tab: activeTab,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
                showNotification('บันทึกและซิงค์ไปยัง Cloud สำเร็จ!', 'success');
                // อัปเดตข้อมูล Local & Cache ทันที โดยไม่ต้องโหลดข้อมูลจาก Firebase ใหม่ (ประหยัด 150 Reads ต่อการเซฟ 1 ครั้ง!)
                sessionStorage.setItem('service_plan_projects_cache', JSON.stringify(allProjects));
                sessionStorage.setItem('service_plan_projects_cache_time', Date.now().toString());
                updateStats(); // อัปเดตตัวเลข Progress ด้านบน
            } catch (err) {
                console.error('Save to Firebase Error:', err);
                showNotification('ข้อผิดพลาดการบันทึก: ' + err.message, 'error');
            }
            renderProjectList(); // Update status badges
        }

                // Test with a simple request

        async function generateWithGemini(promptText) {
            console.log('Calling backend proxy...');

            try {
                const response = await fetch(`${BACKEND_URL}/api/generate`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        prompt: promptText,
                        model: 'gemini-2.5-pro'
                    })
                });

                const data = await response.json();

                // ตรวจสอบ Rate Limit
                if (response.status === 429) {
                    showNotification(data.message || 'ใช้งานบ่อยเกินไป กรุณารอสักครู่', 'warning');
                    hideLoading();
                    return;
                }

                if (!response.ok || !data.success) {
                    throw new Error(data.message || `HTTP ${response.status}`);
                }

                // ดึงข้อความจาก Gemini response (ผ่าน backend)
                const geminiData = data.data;
                console.log('API Response:', geminiData);

                // ดึงข้อความจาก candidates
                let text = '';
                if (geminiData.candidates && geminiData.candidates[0]) {
                    const candidate = geminiData.candidates[0];
                    if (candidate.content && candidate.content.parts) {
                        text = candidate.content.parts.map(p => p.text || '').join('');
                    } else if (candidate.text) {
                        text = candidate.text;
                    }
                    if (candidate.finishReason && candidate.finishReason !== 'STOP') {
                        console.warn('Response may be truncated. Finish reason:', candidate.finishReason);
                    }
                }

                console.log('Generated text length:', text.length);

                // แยก JSON
                let jsonMatch = text.match(/```json\s*([\s\S]+?)\s*```/s);
                if (!jsonMatch) {
                    jsonMatch = text.match(/```\s*([\s\S]+?)\s*```/s);
                }
                if (!jsonMatch) {
                    jsonMatch = text.match(/(\{[\s\S]+\})/s);
                }
                if (!jsonMatch) {
                    jsonMatch = text.match(/(\{[\s\S]*"kpis"[\s\S]*\})/s);
                }

                if (jsonMatch) {
                    let jsonText = (jsonMatch[1] || jsonMatch[0]).trim();
                    jsonText = jsonText.replace(/^```json\s*/, '').replace(/```\s*$/, '');

                    try {
                        const result = JSON.parse(jsonText);
                        fillAIResults(result);

                        // แสดงจำนวน request คงเหลือ
                        const remaining = data.rateLimit?.remaining;
                        const msg = remaining !== undefined
                            ? `AI วิเคราะห์เสร็จแล้ว! (เหลือ ${remaining} ครั้ง/นาที)`
                            : 'AI วิเคราะห์เสร็จแล้ว!';
                        showNotification(msg, 'success');
                    } catch (parseError) {
                        console.error('JSON parse error:', parseError);
                        showNotification('ไม่สามารถแปลงข้อมูล JSON ได้', 'error');
                    }
                } else {
                    console.log('No JSON pattern found in:', text.substring(0, 200));
                    showNotification('ไม่พบข้อมูล JSON ในการตอบกลับ', 'error');
                }

            } catch (e) {
                console.error('Backend error:', e);
                showNotification('ไม่สามารถเชื่อมต่อกับ AI ได้: ' + e.message, 'error');
            }

            hideLoading();
        }

        async function generateWithHuggingFace(promptText) {
            const keyInput = document.getElementById('hf-token-input');

            if (tokenFromInput) {
                hfToken = tokenFromInput;
                localStorage.setItem('hfToken', tokenFromInput);

                    localStorage.setItem('hfToken', token);

                    hideLoading();

                }
            }

            const selectedModel = document.getElementById('preferred-model')?.value;
            const model = selectedModel || 'mistralai/Mistral-7B-Instruct-v0.2';

            console.log('Using HF model:', model);

            try {
                // Call Hugging Face Serverless Inference API (ใช้ฟรี ไม่ต้องตั้งค่า Provider)
                // ใช้ mode: 'cors' เพื่อให้ผ่าน CORS policy
                const response = await fetch(`https://api-inference.huggingface.co/models/${model}`, {
                    method: 'POST',
                    mode: 'cors',
                    cache: 'no-cache',
                    headers: {
                        'Authorization': `Bearer ${hfToken}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        inputs: `<s>[INST] คุณคือผู้ช่วยวิเคราะห์โครงการ ตอบกลับเป็น JSON เท่านั้น\n\n${promptText} [/INST]`,
                        parameters: {
                            max_new_tokens: 1024,
                            temperature: 0.7,
                            return_full_text: false

                if (!response.ok) {
                    const errorData = await response.json().catch(() => ({}));
                    console.error('HF API Error:', errorData);
                    throw new Error(errorData.error || `HTTP ${response.status}`);
                }

                const result = await response.json();
                console.log('HF Response:', result);

                // Extract generated text
                let generatedText = '';
                if (Array.isArray(result) && result.length > 0) {
                    generatedText = result[0].generated_text || '';

        function isNumeric(str) {

        function escapeHtml(text) {
            if (text == null) return '';
            // แปลงเป็น string กรณีที่ไม่ใช่ string (เช่น number, object, array)
            const str = String(text);
            return str
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

                countEl.textContent = `${count}/30`;
                if (count >= 30) {
                    countEl.style.color = '#dc2626'; // แดง
                } else if (count >= 25) {
                    countEl.style.color = '#ea580c'; // ส้ม
                } else {
                    countEl.style.color = '#64748b'; // ปกติ
                }
            }
        }

        function saveDefaultEditorName() {
            const input = document.getElementById('editor-name-input');
            if (input && input.value.trim()) {
                localStorage.setItem('defaultEditorName', input.value.trim());
                showNotification('จดจำชื่อผู้แก้ไขเรียบร้อย!', 'success');
            } else {
                showNotification('กรุณากรอกชื่อก่อนบันทึก', 'warning');
            }
        }

        function saveAIContext() {
            if (!selectedProject) {
                showNotification('กรุณาเลือกโครงการก่อน', 'warning');
                return;
            }

            const contextInput = document.getElementById('ai-context-input');
            const context = contextInput?.value?.trim() || '';

            // บันทึกลง selectedProject
            selectedProject.aiContext = context;
            selectedProject.lastModified = new Date().toISOString();

            // อัปเดต allProjects และ filteredProjects
            const index = allProjects.findIndex(p => p.id === selectedProject.id);
            if (index >= 0) {
                allProjects[index] = selectedProject;
            }
            const filteredIndex = filteredProjects.findIndex(p => p.id === selectedProject.id);
            if (filteredIndex >= 0) {
                filteredProjects[filteredIndex] = selectedProject;
            }

            // บันทึกลง LocalStorage
            localStorage.setItem('editorProjects', JSON.stringify(allProjects));

            showNotification('บันทึก Context เรียบร้อย!', 'success');
        }

        function setupEventListeners() {
            document.getElementById('searchInput')?.addEventListener('input', (e) => {
                applyFilters();
            });
        }

        function resetProject() {
            if (!selectedProject || !confirm('รีเซ็ตข้อมูลโครงการนี้?')) return;

            // If we have sourceProjects (from initial import), use that
            // Otherwise just clear the after data
            const base = sourceProjects && sourceProjects.length > 0
                ? sourceProjects.find(p => p.id === selectedProject.id)
                : null;

            if (base) {
                const index = allProjects.findIndex(p => p.id === selectedProject.id);
                allProjects[index] = JSON.parse(JSON.stringify(base));
                selectedProject = allProjects[index];
            } else {
                // Just clear the after data and status
                selectedProject.after = {
                    objective: '',
                    target_group: '',
                    method: '',
                    innovation: '',
                    indicators: [],
                    kpis: []
                };
                selectedProject.status = 'draft';
                selectedProject.lastModified = null;
            }

            renderEditor();
            showNotification('รีเซ็ตเรียบร้อย', 'success');
        }

        function showNotification(message, type = 'success') {
            const notification = document.createElement('div');
            notification.className = `notification ${type}`;
            notification.innerHTML = `
                <div style="display: flex; align-items: center; gap: 10px;">
                    <i class="fas fa-${type === 'success' ? 'check-circle' : type === 'error' ? 'times-circle' : 'info-circle'}"></i>
                    <div>${message}</div>
                </div>
            `;
            document.body.appendChild(notification);
            setTimeout(() => notification.remove(), 3000);
        }

        // ============================================
        // EDIT HISTORY & PROGRESSION TRACKING
        // ============================================

        function showEditHistory() {
            if (!selectedProject) {
                showNotification('กรุณาเลือกโครงการก่อน', 'warning');
                return;
            }

            const history = selectedProject.editHistory || [];

            if (history.length === 0) {
                showNotification('ยังไม่มีประวัติการแก้ไข', 'info');
                return;
            }

            // สร้าง Modal แสดงประวัติ
            const modal = document.createElement('div');
            modal.className = 'history-modal';
            modal.style.cssText = `
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: rgba(0,0,0,0.5);
                display: flex;
                align-items: center;
                justify-content: center;
                z-index: 10000;
            `;

            const historyHTML = history.slice().reverse().map((record, index) => {
                const date = new Date(record.timestamp).toLocaleString('th-TH');
                const actionIcon = record.aiAssisted ? '🤖' : '✏️';
                const actionText = record.aiAssisted ? 'AI Assist' : 'แก้ไขด้วยตนเอง';

                return `
                    <div style="
                        padding: 12px;
                        border-bottom: 1px solid #e2e8f0;
                        ${index === 0 ? 'background: #f0fdf4;' : ''}
                    ">
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px;">
                            <span style="font-weight: 600; color: var(--primary);">
                                ${record.aiAssisted ? '🤖' : '✏️'} ${record.editor}
                            </span>
                            <span style="font-size: 0.85em; color: #64748b;">${date}</span>
                        </div>
                        <div style="font-size: 0.9em; color: #475569; margin-bottom: 4px;">
                            <strong>การกระทำ:</strong> ${actionText}
                        </div>
                        <div style="font-size: 0.85em; color: #64748b;">
                            <strong>ส่วนที่แก้ไข:</strong> ${record.changedFields?.join(', ') || '-'}
                        </div>
                    </div>
                `;
            }).join('');

            modal.innerHTML = `
                <div style="
                    background: white;
                    border-radius: 12px;
                    width: 90%;
                    max-width: 600px;
                    max-height: 80vh;
                    overflow: hidden;
                    box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
                ">
                    <div style="
                        padding: 20px;
                        border-bottom: 1px solid #e2e8f0;
                        display: flex;
                        justify-content: space-between;
                        align-items: center;
                    ">
                        <h3 style="margin: 0; color: var(--text);">
                            <i class="fas fa-history" style="color: var(--primary); margin-right: 8px;"></i>
                            ประวัติการแก้ไข: ${selectedProject.id}
                        </h3>
                        <button onclick="this.closest('.history-modal').remove()" style="
                            background: none;
                            border: none;
                            font-size: 1.5em;
                            cursor: pointer;
                            color: #64748b;
                        ">×</button>
                    </div>
                    <div style="max-height: 60vh; overflow-y: auto;">
                        ${historyHTML}
                    </div>
                    <div style="padding: 15px; border-top: 1px solid #e2e8f0; background: #f8fafc;">
                        <div style="font-size: 0.9em; color: #64748b; text-align: center;">
                            แก้ไขทั้งหมด ${history.length} ครั้ง | 
                            AI Assist ${history.filter(h => h.aiAssisted).length} ครั้ง |
                            แก้ไขด้วยตนเอง ${history.filter(h => !h.aiAssisted).length} ครั้ง
                        </div>
                    </div>
                </div>
            `;

            modal.addEventListener('click', (e) => {
                if (e.target === modal) modal.remove();
            });

            document.body.appendChild(modal);
        }

        // ฟังก์ชันดู Progression ทั้งหมด (สำหรับ Admin)
        function showGlobalProgression() {
            // ตรวจสอบจากทั้ง editHistory และ ข้อมูล after (สำหรับโครงการที่บันทึกก่อนมี editHistory)
            const hasBeenEdited = (p) => {
                return (p.editHistory && p.editHistory.length > 0)
                    || p.lastModified
                    || (p.after?.objective && p.after.objective.trim() !== '')
                    || (p.after?.method && p.after.method.trim() !== '');
            };
            const hasAI = (p) => {
                return p.editHistory?.some(h => h.aiAssisted)
                    || (p.after?.objective && p.after?.method && p.after.objective.trim() !== '' && p.after.method.trim() !== '');
            };

            const stats = {
                total: allProjects.length,
                edited: allProjects.filter(p => hasBeenEdited(p)).length,
                aiAssisted: allProjects.filter(p => hasAI(p)).length,
                pending: allProjects.filter(p => !hasBeenEdited(p)).length
            };

            // หาผู้แก้ไขทั้งหมด (จากทั้ง editHistory และ lastEditedBy)
            const editors = {};
            allProjects.forEach(p => {
                if (p.editHistory) {
                    p.editHistory.forEach(h => {
                        editors[h.editor] = (editors[h.editor] || 0) + 1;
                    });
                } else if (p.lastEditedBy) {
                    editors[p.lastEditedBy] = (editors[p.lastEditedBy] || 0) + 1;
                }
            });

            const topEditors = Object.entries(editors)
                .sort((a, b) => b[1] - a[1])
                .slice(0, 10)
                .map(([name, count]) => `<li>${name}: ${count} ครั้ง</li>`)
                .join('');

            const modal = document.createElement('div');
            modal.className = 'progression-modal';
            modal.style.cssText = `
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: rgba(0,0,0,0.5);
                display: flex;
                align-items: center;
                justify-content: center;
                z-index: 10000;
            `;

            modal.innerHTML = `
                <div style="
                    background: white;
                    border-radius: 12px;
                    width: 90%;
                    max-width: 700px;
                    max-height: 80vh;
                    overflow: hidden;
                    box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
                ">
                    <div style="
                        padding: 20px;
                        border-bottom: 1px solid #e2e8f0;
                        display: flex;
                        justify-content: space-between;
                        align-items: center;
                    ">
                        <h3 style="margin: 0; color: var(--text);">
                            <i class="fas fa-chart-bar" style="color: var(--primary); margin-right: 8px;"></i>
                            สรุปความคืบหน้า (Progression)
                        </h3>
                        <button onclick="this.closest('.progression-modal').remove()" style="
                            background: none;
                            border: none;
                            font-size: 1.5em;
                            cursor: pointer;
                            color: #64748b;
                        ">×</button>
                    </div>
                    <div style="max-height: 60vh; overflow-y: auto; padding: 20px;">
                        <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-bottom: 20px;">
                            <div style="background: #f0f9ff; padding: 15px; border-radius: 8px; text-align: center;">
                                <div style="font-size: 2em; font-weight: 700; color: var(--primary);">${stats.total}</div>
                                <div style="color: #64748b;">โครงการทั้งหมด</div>
                            </div>
                            <div style="background: #f0fdf4; padding: 15px; border-radius: 8px; text-align: center;">
                                <div style="font-size: 2em; font-weight: 700; color: #16a34a;">${stats.edited}</div>
                                <div style="color: #64748b;">แก้ไขแล้ว</div>
                            </div>
                            <div style="background: #fef3c7; padding: 15px; border-radius: 8px; text-align: center;">
                                <div style="font-size: 2em; font-weight: 700; color: #d97706;">${stats.aiAssisted}</div>
                                <div style="color: #64748b;">ใช้ AI Assist</div>
                            </div>
                            <div style="background: #fee2e2; padding: 15px; border-radius: 8px; text-align: center;">
                                <div style="font-size: 2em; font-weight: 700; color: #dc2626;">${stats.pending}</div>
                                <div style="color: #64748b;">รอแก้ไข</div>
                            </div>
                        </div>
                        
                        <div style="background: #f8fafc; padding: 15px; border-radius: 8px;">
                            <h4 style="margin: 0 0 10px 0; color: var(--text);">ผู้มีส่วนร่วมสูงสุด</h4>
                            <ol style="margin: 0; padding-left: 20px;">
                                ${topEditors || '<li style="color: #64748b;">ยังไม่มีข้อมูล</li>'}
                            </ol>
                        </div>

                        <div style="margin-top: 20px; padding: 15px; background: #eff6ff; border-radius: 8px; border-left: 4px solid var(--primary);">
                            <strong>คำแนะนำ:</strong><br>
                            ส่งออกข้อมูล (Export) เพื่อดูรายละเอียดทั้งหมดหรือนำไปวิเคราะห์เพิ่มเติม
                        </div>
                    </div>
                </div>
            `;

            modal.addEventListener('click', (e) => {
                if (e.target === modal) modal.remove();
            });

            document.body.appendChild(modal);
        }

        // ฟังก์ชันส่งออกข้อมูลสำหรับ Admin (รวมถึง Edit History)
        function exportWithHistory() {
            const exportData = allProjects.map(p => ({
                ...p,
                editCount: p.editHistory?.length || 0,
                lastEditor: p.lastEditedBy || '-',
                aiAssistCount: p.editHistory?.filter(h => h.aiAssisted).length || 0,
                manualEditCount: p.editHistory?.filter(h => !h.aiAssisted).length || 0
            }));

            const dataStr = JSON.stringify(exportData, null, 2);
            const blob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(blob);

            const a = document.createElement('a');
            a.href = url;
            a.download = `projects_with_history_${new Date().toISOString().slice(0, 10)}.json`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);

            showNotification('ส่งออกข้อมูลพร้อมประวัติเรียบร้อย!', 'success');
        }

        // แสดงคู่มือการใช้งาน
        function showUserManual() {
            const modal = document.createElement('div');
            modal.style.cssText = `
                position: fixed; top: 0; left: 0; width: 100%; height: 100%;
                background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center;
                z-index: 1000; backdrop-filter: blur(4px); padding: 20px;
            `;

            modal.innerHTML = `
                <div style="background: white; border-radius: 12px; width: 100%; max-width: 850px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); display: flex; flex-direction: column; max-height: 90vh;">
                    <div style="padding: 20px; border-bottom: 1px solid #e2e8f0; display: flex; justify-content: space-between; align-items: center; border-radius: 12px 12px 0 0; background: #f8fafc;">
                        <h3 style="margin: 0; color: var(--primary); display: flex; align-items: center; gap: 10px;">
                            <i class="fas fa-book-open"></i> คู่มือการบันทึกและแก้ไขข้อมูลโครงการ
                        </h3>
                        <button onclick="this.closest('[style*=\\'position: fixed\\']').remove()" style="background: none; border: none; font-size: 1.5em; cursor: pointer; color: #64748b; padding: 0;">&times;</button>
                    </div>
                    <div style="padding: 25px; overflow-y: auto; flex: 1; line-height: 1.6; color: #334155; font-size: 0.95em;">
                        
                        <h4 style="color: #0f172a; margin-top: 0; border-left: 4px solid var(--primary); padding-left: 10px;">1. การค้นหาโครงการของคุณ</h4>
                        <ul style="padding-left: 20px; margin-bottom: 20px;">
                            <li>ฝั่งซ้ายมือจะมีเมนูตัวกรอง (Filters) เลือก <strong>ประเภท (CSO/FLAGSHIP)</strong> หรือ <strong>สาขา</strong> ที่ท่านรับผิดชอบ</li>
                            <li>หรือใช้ <strong>ช่องค้นหา 🔍</strong> โดยพิมพ์ชื่อโครงการ หมวดหมู่ หรือ รหัสโครงการได้โดยตรง</li>
                            <li>คลิกเลือกโครงการของท่านเพื่อเปิดหน้าจัดการข้อมูลทางด้านขวา</li>
                        </ul>

                        <h4 style="color: #0f172a; border-left: 4px solid var(--primary); padding-left: 10px;">2. ขั้นตอนการแก้ไขข้อมูล</h4>
                        <div style="background: #f0f9ff; padding: 15px; border-radius: 8px; margin-bottom: 20px;">
                            เมื่อเปิดโครงการแล้วให้คลิกที่แถบ <strong>"✨ AI Recommended"</strong> เพื่อเริ่มปรับปรุงข้อมูล โดยเลือกทำได้ 2 วิธี:
                            <ol style="margin-top: 10px; margin-bottom: 0;">
                                <li><strong>พิมพ์แก้ไขด้วยตนเอง:</strong> พิมพ์ข้อมูลลงในช่อง วัตถุประสงค์ (SMART), กลุ่มเป้าหมาย, วิธีดำเนินการ ฯลฯ ได้เลย</li>
                                <li><strong>🔥 ใช้ AI ช่วยเขียนให้ (แนะนำ):</strong> 
                                    <ul style="margin-top: 5px;">
                                        <li>พิมพ์ <strong>ข้อมูล Context เพิ่มเติม (สำคัญ)</strong> ให้ AI รู้บริบท (เช่น โครงการนี้เน้นผู้ป่วยเรื้อรัง ทำใน 18 อำเภอ)</li>
                                        <li>กดปุ่ม <strong>"✨ สร้างด้วย AI"</strong> ระบบจะปรับภาษาให้เป็นทางการและสอดคล้องกับหลัก SMART</li>
                                    </ul>
                                </li>
                            </ol>
                        </div>

                        <h4 style="color: #0f172a; border-left: 4px solid #16a34a; padding-left: 10px;">3. ขั้นตอนการบันทึกข้อมูล (สำคัญมาก!)</h4>
                        <div style="background: #f0fdf4; border: 1px solid #bbf7d0; padding: 15px; border-radius: 8px; margin-bottom: 20px;">
                            <ul style="margin-top: 0; margin-bottom: 0;">
                                <li>ก่อนบันทึก ให้ดูที่มุมล่างขวา <strong>พิมพ์ "ชื่อ-นามสกุล" ของท่าน</strong> ลงในช่อง "แก้ไขโดย:" (แนะนำให้กดปุ่ม "💾 จดจำชื่อฉัน" ไว้)</li>
                                <li>กดปุ่มสีฟ้าใหญ่ <strong>"💾 บันทึก/ซิงค์ (Save)"</strong> </li>
                                <li>รอจนกว่าจะมีข้อความแจ้งเตือนสีเขียวปรากฏว่าบันทึกสำเร็จ ข้อมูลของท่านจะถูกส่งขึ้นคลาวด์และปลอดภัยทันที</li>
                            </ul>
                        </div>

                        <h4 style="color: #0f172a; border-left: 4px solid #f59e0b; padding-left: 10px;">💡 ข้อแนะนำเพิ่มเติม</h4>
                        <ul style="padding-left: 20px; margin-bottom: 0;">
                            <li>ระบบบันทึกข้อมูลแยกตามโครงการ ปลอดภัย ไม่มีการเขียนทับข้อมูลของผู้อื่น</li>
                            <li>ท่านสามารถกดปุ่ม <strong>"🕒 ประวัติ (History)"</strong> เพื่อดูว่าใครเคยเข้ามาแก้ไขโครงการนี้บ้าง</li>
                        </ul>
                    </div>
                    <div style="padding: 15px 20px; border-top: 1px solid #e2e8f0; text-align: right; background: #f8fafc; border-radius: 0 0 12px 12px;">
                        <button class="btn btn-primary" onclick="this.closest('[style*=\\'position: fixed\\']').remove()">เข้าใจแล้ว ปิดหน้าต่าง</button>
                    </div>
                </div>
            `;

            modal.addEventListener('click', (e) => {
                if (e.target === modal) modal.remove();
            });

            document.body.appendChild(modal);
        }
    </script>
</body>
